{{define "content"}}
{{template "head" .}}

<body :class="$store.menu && 'overflow-hidden'">
    <div x-data="{ loading: true, search: '', entries: [], get filtered() { return this.entries.filter(i => JSON.stringify(i).toLowerCase().includes(this.search)) } }"
        x-init="fetch('{{ .Page.Data }}').then(res => res.json()).then(res => entries = res, loading = false, console.log('loaded'))" class="flex gap-24 flex-col">
        {{template "nav" .}}
        <div class="flex-initial text-center flex flex-col lg:flex-row justify-center mx-24 gap-14">
            <h1 class="text-4xl font-serif capitalize basis-1/2">{{ .Page.Title }}</h1>
            <div class="flex justify-start items-center relative basis-1/2">
                <input x-model="search"
                    class="text-sm leading-none text-left text-gray-600 px-4 py-3 w-full border rounded border-gray-300  outline-none"
                    type="text" placeholder="Filter within this page...">
                <svg class="absolute right-3 z-10 cursor-pointer" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 17C13.866 17 17 13.866 17 10C17 6.13401 13.866 3 10 3C6.13401 3 3 6.13401 3 10C3 13.866 6.13401 17 10 17Z"
                        stroke="#4B5563" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M21 21L15 15" stroke="#4B5563" stroke-width="1.66667" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>
        <i x-transition x-show="loading" class="fa-solid fa-circle-notch text-6xl"></i>
        <template x-for="entry in filtered">
            <div class="flex-initial flex md:flex-row flex-col justify-evenly gap-4 mx-10">
                <div class="flex-initial text-center basis-1/2">
                    <img class="animate__animated animate__fadeIn rounded inline object-center w-10/12 max-w-full h-auto max-h-full"
                        :src="'/assets/image/'+entry.image" alt="">
                </div>
                <div class="flex-initial basis-1/2 text-center justify-around gap-10 flex flex-col">
                    <h1 x-text="entry.name" class="text-3xl"></h1>
                    <span class="text-slate-700 uppercase font-light">Summary</span>
                    <p x-text="entry.desc" class="leading-loose"></p>
                    <span class="text-slate-700 font-light uppercase">Specifications</span>
                    <table class="table-fixed text-lg font-mono uppercase">
                        <tbody>
                            <template x-for="prop in entry.props.split('\n')">
                                <tr class="border-slate-500 border-y border-dotted">
                                    <td x-text="prop.split(':')[0]"></td>
                                    <td x-text="prop.split(':')[1]"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    <span class="text-slate-700 uppercase font-light">Datasheets</span>
                    <div class="flex gap-5 justify-center text-emerald-500">
                        <template x-for="file in entry.files.split('\n')">
                            <div>
                                <i class="fa-solid fa-file-pdf"></i>&nbsp;<span x-text="file"
                                    class="hover:cursor-pointer uppercase underline decoration-wavy underline-offset-4"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>
        {{template "footer" .}}
    </div>
</body>

</html>
{{end}}
