

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.store('menu', false)
    })
</script>

    <link href="/dist/out.css" rel="stylesheet">
    <title>ADR Power Systems</title>
</head>


<body :class="$store.menu && 'overflow-hidden'">
    <div x-data="{ search: '', entries: [], get filtered() { return this.entries.filter(i => JSON.stringify(i).toLowerCase().includes(this.search)) } }"
        x-init="fetch('https://opensheet.elk.sh/1NQGBDrmzIxoMZ7uvvdw0AxWmW4jO4ExOL8WC1AloJX0/Outboard').then(res => res.json()).then(res => entries = res)" class="flex gap-24 flex-col">
        
<div id="nav"
    class="flex font-sans bg-gradient-to-tr from-sky-700 to-blue-900 font-bold text-slate-100 flex-wrap flex-initial justify-around lg:justify-start items-center gap-10 basis-1/2">
    <a class="basis-1/2 lg:basis-auto" href="/">
        <img class="inline invert lg:w-1/6 w-1/3 h-auto my-5" src="/assets/image/logo.webp" alt="">
    </a>
    <div class="flex-initial hidden lg:block">
        <a href="/index.html">
            <span class="cursor-pointer">Home</span>
        </a>
    </div>
    <div class="flex-initial hidden lg:block">
        <span class="cursor-pointer">About</span>
    </div>
    <div class="flex-initial hidden lg:block">
        <a href="/parts.html">
            <span class="cursor-pointer">Parts</span>
        </a>
    </div>
    <div class="flex-initial hidden lg:block">
        <span class="cursor-pointer">Sales</span>
    </div>
    <div @click="$store.menu = ! $store.menu" class="flex-initial mr-3 hover:cursor-pointer lg:hidden"
        x-effect="console.log($store.menu)">
        <i class="fa-solid fa-bars text-3xl"></i>
    </div>
</div>
<div x-show="$store.menu" x-transition x-cloak
    class="flex flex-col gap-[2.75rem] text-3xl justify-center items-center h-full w-full fixed top-0 left-0 z-50 bg-gray-900">
    <h1 class="text-slate-100 underline uppercase tracking-wide underline-offset-4">Home</h1>
    <h1 class="text-slate-100 underline uppercase tracking-wide underline-offset-4">About</h1>
    <h1 class="text-slate-100 underline uppercase tracking-wide underline-offset-4">Parts</h1>
    <h1 class="text-slate-100 underline uppercase tracking-wide underline-offset-4">Sales</h1>
    <i @click="$store.menu = ! $store.menu" class="text-slate-100 fa-solid fa-circle-xmark text-5xl cursor-pointer"></i>
</div>

        <div class="flex-initial text-center flex flex-col lg:flex-row justify-center mx-24 gap-14">
            <h1 class="text-4xl font-serif capitalize basis-1/2">Outboard Engines</h1>
            <div class="flex justify-start items-center relative basis-1/2">
                <input x-model="search"
                    class="text-sm leading-none text-left text-gray-600 px-4 py-3 w-full border rounded border-gray-300  outline-none"
                    type="text" placeholder="Search">
                <svg class="absolute right-3 z-10 cursor-pointer" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M10 17C13.866 17 17 13.866 17 10C17 6.13401 13.866 3 10 3C6.13401 3 3 6.13401 3 10C3 13.866 6.13401 17 10 17Z"
                        stroke="#4B5563" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M21 21L15 15" stroke="#4B5563" stroke-width="1.66667" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
        </div>
        <template x-for="entry in filtered">
            <div class="flex-initial flex md:flex-row flex-col justify-evenly gap-4 mx-10">
                <div class="flex-initial text-center basis-1/2">
                    <img class="animate__animated animate__fadeIn rounded inline object-center w-10/12 max-w-full h-auto max-h-full"
                        src="/assets/image/engine.jpg" alt="">
                </div>
                <div class="flex-initial basis-1/2 text-center justify-around gap-10 flex flex-col">
                    <h1 x-text="entry.name" class="text-3xl"></h1>
                    <span class="text-slate-700 uppercase font-light">Summary</span>
                    <p x-text="entry.desc" class="leading-loose"></p>
                    <span class="text-slate-700 font-light uppercase">Specifications</span>
                    <table class="table-fixed text-lg font-mono uppercase">
                        <tbody>
                            <template x-for="prop in entry.props.split('\n')">
                                <tr class="border-slate-500 border-y border-dotted">
                                    <td x-text="prop.split(':')[0]"></td>
                                    <td x-text="prop.split(':')[1]"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                    <span class="text-slate-700 uppercase font-light">Datasheets</span>
                    <div class="flex gap-5 justify-center text-emerald-500">
                        <span
                            class="hover:cursor-pointer uppercase underline decoration-wavy underline-offset-4">Download
                            Datasheet (English) <i class="fa-solid fa-file-pdf"></i></span>
                        <span
                            class="hover:cursor-pointer uppercase underline decoration-wavy underline-offset-4">Download
                            Datasheet (Spanish) <i class="fa-solid fa-file-pdf"></i></span>
                    </div>
                </div>
            </div>
        </template>
        
<div id="nav" class="flex flex-wrap flex-initial justify-center items-baseline bg-sky-900 p-14 gap-10 basis-1/2">
    <div class="flex-initial">
        <a href="/index.html">
            <span class="cursor-pointer font-sans font-thin text-gray-400">
                travis@adrpowersystems.com
            </span>
            <br>
            <span class="cursor-pointer font-sans font-thin text-gray-400">
                1111
            </span>
        </a>
    </div>
</div>

    </div>
</body>
</html>
